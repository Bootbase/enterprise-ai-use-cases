<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <circle cx="32" cy="32" r="30" fill="#faf9f5" stroke="#d97757" stroke-width="1"/>
  
  <!-- Brain outline - left hemisphere -->
  <path d="M 28 20 Q 20 20 18 28 Q 16 32 18 38 Q 20 42 28 44" 
        fill="none" stroke="#d97757" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Brain outline - right hemisphere -->
  <path d="M 36 20 Q 44 20 46 28 Q 48 32 46 38 Q 44 42 36 44" 
        fill="none" stroke="#d97757" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Brain center fold -->
  <path d="M 32 20 Q 32 32 32 44" 
        stroke="#d97757" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6"/>
  
  <!-- Circuit dots - upper left -->
  <circle cx="22" cy="26" r="2" fill="#d97757"/>
  
  <!-- Circuit dots - center -->
  <circle cx="32" cy="24" r="2" fill="#d97757"/>
  
  <!-- Circuit dots - upper right -->
  <circle cx="42" cy="26" r="2" fill="#d97757"/>
  
  <!-- Circuit dots - lower left -->
  <circle cx="24" cy="40" r="1.5" fill="#d97757"/>
  
  <!-- Circuit dots - lower right -->
  <circle cx="40" cy="40" r="1.5" fill="#d97757"/>
  
  <!-- Circuit connecting lines -->
  <line x1="22" y1="26" x2="32" y2="24" stroke="#d97757" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
  <line x1="32" y1="24" x2="42" y2="26" stroke="#d97757" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
  <line x1="22" y1="26" x2="24" y2="40" stroke="#d97757" stroke-width="0.8" opacity="0.4" stroke-linecap="round"/>
  <line x1="42" y1="26" x2="40" y2="40" stroke="#d97757" stroke-width="0.8" opacity="0.4" stroke-linecap="round"/>
</svg>